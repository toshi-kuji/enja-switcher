<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: fresh cyan gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#b8e8f5"/>
      <stop offset="40%" stop-color="#6ccfe0"/>
      <stop offset="100%" stop-color="#3a8fb7"/>
    </linearGradient>

    <!-- Glass top highlight -->
    <linearGradient id="glassTop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glass left edge shine -->
    <linearGradient id="glassLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Specular highlight (top-left corner) -->
    <radialGradient id="specular" cx="0.3" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Border -->
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4f0f8"/>
      <stop offset="100%" stop-color="#2d7a9c"/>
    </linearGradient>

    <!-- Letter glow effect -->
    <filter id="letterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Outer glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="glow1"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="glow1" operator="in" result="outerGlow"/>
      <!-- Softer wider glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="glow2"/>
      <feFlood flood-color="#e0f7ff" flood-opacity="0.3" result="glowColor2"/>
      <feComposite in="glowColor2" in2="glow2" operator="in" result="wideGlow"/>
      <!-- Combine -->
      <feMerge>
        <feMergeNode in="wideGlow"/>
        <feMergeNode in="outerGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for icon shape -->
    <clipPath id="iconClip">
      <rect x="36" y="36" width="440" height="440" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Main background -->
  <rect x="36" y="36" width="440" height="440" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="36" y="36" width="440" height="440" rx="96" ry="96" fill="none" stroke="url(#border)" stroke-width="2" opacity="0.6"/>

  <g clip-path="url(#iconClip)">
    <!-- Glass top half highlight -->
    <rect x="36" y="36" width="440" height="220" fill="url(#glassTop)"/>

    <!-- Glass left edge -->
    <rect x="36" y="36" width="440" height="440" fill="url(#glassLeft)"/>

    <!-- Specular highlight -->
    <rect x="36" y="36" width="440" height="440" fill="url(#specular)"/>

    <!-- Subtle divider line between E and J -->
    <line x1="256" y1="140" x2="256" y2="380" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- "E" - left half, upper position -->
    <text x="152" y="315" text-anchor="middle" font-family="'SF Pro Rounded', 'Nunito', 'Varela Round', system-ui, sans-serif" font-size="220" font-weight="900" fill="#ffffff" fill-opacity="0.92" filter="url(#letterGlow)">E</text>

    <!-- "J" - right half, lower position -->
    <text x="362" y="375" text-anchor="middle" font-family="'SF Pro Rounded', 'Nunito', 'Varela Round', system-ui, sans-serif" font-size="220" font-weight="900" fill="#ffffff" fill-opacity="0.85" filter="url(#letterGlow)">J</text>

    <!-- Bottom reflection -->
    <rect x="36" y="340" width="440" height="136" fill="#ffffff" opacity="0.04"/>
  </g>
</svg>
